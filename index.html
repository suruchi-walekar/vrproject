<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suruchi Walekar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Syne:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --ink: #efefef;
      --ink-dim: #666;
      --accent: #5b8dd9;
      --rule: #222;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main {
      width: 100%;
      max-width: 520px;
      opacity: 0;
      animation: fadein 0.9s ease forwards;
    }

    @keyframes fadein {
      to { opacity: 1; }
    }

    .name {
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      font-weight: 300;
      letter-spacing: 0.01em;
      line-height: 1.1;
      margin-bottom: 0.35rem;
    }

    .tagline {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: 3rem;
    }

    hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin-bottom: 2rem;
    }

    .projects {
      display: flex;
      flex-direction: column;
    }

    .project {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 1px solid var(--rule);
      text-decoration: none;
      color: inherit;
      transition: color 0.2s;
    }

    .project:first-child {
      border-top: 1px solid var(--rule);
    }

    .project:hover { color: var(--accent); }
    .project:hover .arrow { transform: translateX(4px); color: var(--accent); }

    .project-left {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .project-title {
      font-size: 1.25rem;
      font-weight: 400;
    }

    .project-desc {
      font-family: 'Syne', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }

    .arrow {
      font-size: 1.1rem;
      color: var(--ink-dim);
      transition: transform 0.2s, color 0.2s;
      flex-shrink: 0;
      margin-left: 1rem;
    }
  </style>
</head>
<body>
  <main>
    <h1 class="name">Suruchi Walekar</h1>
    <p class="tagline">programmer, i suppose</p>
    <hr>
    <div class="projects">

      <a class="project" href="https://suruchi-walekar.github.io/dataviz/">
        <div class="project-left">
          <span class="project-title">Analysis of PlanetTerp Data</span>
          <span class="project-desc">CMSC320 Final Project</span>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="project" href="https://suruchi-walekar.github.io/vrproject/">
        <div class="project-left">
          <span class="project-title">VR Piano Keyboard</span>
          <span class="project-desc">CMSC731 Final Project</span>
        </div>
        <span class="arrow">→</span>
      </a>

    </div>
  </main>
</body>
</html>
